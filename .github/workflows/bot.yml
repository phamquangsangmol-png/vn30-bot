name: Run VN30 Bot

on:
  schedule:
    - cron: "0 3,7,11 * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install libraries
        run: |
          pip install requests yfinance pandas ta

      - name: Run bot
        run: python bot.py
